name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.0)'
        required: true
      skip_publish:
        description: 'Skip crates.io publish (release notes only)'
        type: boolean
        default: false
      dry_run:
        description: 'Dry-run publish (verify without uploading)'
        type: boolean
        default: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Determine version
        id: version
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Publishing version: ${VERSION}"

      - name: Verify version in Cargo.toml
        run: |
          TOML_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [[ "$TOML_VERSION" != "${{ steps.version.outputs.version }}" ]]; then
            echo "Version mismatch: Cargo.toml has ${TOML_VERSION}, expected ${{ steps.version.outputs.version }}"
            exit 1
          fi

      - name: Dry-run publish
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          cargo package -p narrow --allow-dirty
          echo "Dry-run passed."

      - name: Publish to crates.io
        if: ${{ github.event.inputs.skip_publish != 'true' && github.event.inputs.dry_run != 'true' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          echo "Publishing narrow..."
          cargo publish -p narrow
          echo "Published successfully."

      - name: Generate release notes
        id: release_notes
        run: |
          if [[ -f RELEASE_NOTES.md ]]; then
            echo "Using RELEASE_NOTES.md"
            NOTES=$(cat RELEASE_NOTES.md)
          elif command -v git-cliff &>/dev/null; then
            echo "Generating release notes with git-cliff"
            NOTES=$(git-cliff --latest --strip header)
          else
            echo "Using default release notes"
            NOTES="Release v${{ steps.version.outputs.version }}"
          fi
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.release_notes.outputs.notes }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
