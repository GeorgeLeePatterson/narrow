version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      arrow-family:
        patterns:
          - "arrow"
          - "arrow-*"
        update-types:
          - "major"
          - "minor"
          - "patch"
      patch-updates:
        exclude-patterns:
          - "arrow"
          - "arrow-*"
        update-types:
          - "patch"
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      github-actions-all:
        patterns:
          - "*"
    open-pull-requests-limit: 1
    rebase-strategy: "disabled"
